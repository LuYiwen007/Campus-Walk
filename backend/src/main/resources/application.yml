# 若启动后立即退出：请看控制台是否出现 Access denied / using password: NO —— 表示未配置数据库密码。
# 任选其一：① 环境变量 MYSQL_PASSWORD 或 SPRING_DATASOURCE_PASSWORD ② 在「运行工作目录」下放置 application-local.yml（见仓库内 application-local.example.yml）
server:
  port: ${API_PORT:8081}

spring:
  application:
    name: campus-walk-api
  config:
    # 工作目录为 backend 时用 ./ ；在仓库根目录运行时用 ./backend/
    import: optional:file:./application-local.yml,optional:file:./backend/application-local.yml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:campus_walk}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

app:
  jwt-secret: ${JWT_SECRET:dev-change-on-server}
  jwt-algorithm: HS256
  jwt-expire-minutes: ${JWT_EXPIRE_MINUTES:10080}
  cors-origins: ${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:8081,http://127.0.0.1:8081}
  seed-on-startup: ${SEED_ON_STARTUP:true}
  message-retention-days: ${MESSAGE_RETENTION_DAYS:10}
  dashscope-api-key: ${DASHSCOPE_API_KEY:}
  dashscope-model: ${DASHSCOPE_MODEL:qwen-turbo}
  dashscope-workspace: ${DASHSCOPE_WORKSPACE:}
  dashscope-base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation}
  dashscope-compatible-chat-url: ${DASHSCOPE_COMPATIBLE_CHAT_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
  dashscope-vision-model: ${DASHSCOPE_VISION_MODEL:qwen-vl-plus}
  # 百炼对话应用 ID：请在本机 application-local.yml 中直接写值，或设环境变量 DASHSCOPE_DIALOGUE_APP_ID（勿把真实 ID 提交到 Git）
  dashscope-dialogue-app-id: ${DASHSCOPE_DIALOGUE_APP_ID:}
  # 路线规划模型 system 全文由环境变量注入（与模型平台一致），仓库不保存提示词正文
  route-planner-system-prompt: ${ROUTE_PLANNER_SYSTEM_PROMPT:}
  # AR 识别：视觉模型 system（可选，留空则用后端内置短提示）
  ar-building-vision-system-prompt: ${AR_BUILDING_VISION_SYSTEM_PROMPT:}
  # 高德 REST（地理编码）：服务端写入途经点坐标；环境变量 AMAP_REST_KEY
  amap-rest-key: ${AMAP_REST_KEY:}
  amap-geocode-city: ${AMAP_GEOCODE_CITY:成都}
